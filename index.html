<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <script src="./tic-tac-toe.js" defer></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <p>Scores</p>
        <div class="score">
            <img src="./img/cross.png" alt="cross symbol" width="50px">
            <p></p>
        </div>
        <div class="score">
            <img src="./img/circle.png" alt="circle symbol" width="50px">
            <p></p>
        </div>
    </header>
    <main class="board-container">
        <div><button class="grid-cell"><img src="./img/nothing.png" alt=""></button></div>
        <div><button class="grid-cell"><img src="./img/nothing.png" alt=""></button></div>
        <div><button class="grid-cell"><img src="./img/nothing.png" alt=""></button></div>
        <div><button class="grid-cell"><img src="./img/nothing.png" alt=""></button></div>
        <div><button class="grid-cell"><img src="./img/nothing.png" alt=""></button></div>
        <div><button class="grid-cell"><img src="./img/nothing.png" alt=""></button></div>
        <div><button class="grid-cell"><img src="./img/nothing.png" alt=""></button></div>
        <div><button class="grid-cell"><img src="./img/nothing.png" alt=""></button></div>
        <div><button class="grid-cell"><img src="./img/nothing.png" alt=""></button></div>
    </main>
    
</body>
</html>
